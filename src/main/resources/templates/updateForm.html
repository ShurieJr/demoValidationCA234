<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee MS</title>
</head>
<body>
<div>
    <h1>Update Employee details</h1>
    <form th:action="@{/emp/update/{id}(id=${employee.employeeId})}"
          th:object="${employee}" th:method="post">
        <div>
<!--            <input type="hidden" th:field="*{employeeId}" />-->
            <Label for="name">Name</Label>
            <input th:field="*{name}" id="name" type="text" placeholder="Enter Employee name">
            <p style="color:red"
               th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}">

            </p>
        </div>
        <div>
            <Label for="email">Email</Label>
            <input th:field="*{email}" id="email" type="email" placeholder="Enter Employee email">
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></p>
        </div>
        <div>
            <Label for="department">department</Label>
            <input th:field="*{department}" id="department" type="text" placeholder="Enter Employee department">
            <p th:if="${#fields.hasErrors('department')}" th:errors="*{department}" style="color:red"></p>
        </div>



        <button type="submit">Update</button>
    </form>
</div>

<footer th:replace="~{/fragments/footer :: footer}"> </footer>
</body>
</html>
